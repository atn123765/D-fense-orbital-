<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN ONLINE | FULL EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --gold: #ffd700; --bg: #020205; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none; }
        
        canvas { display: block; position: fixed; inset: 0; z-index: 1; filter: contrast(1.1) brightness(1.1); }

        /* UI LAYER */
        .screen { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(0,20,40,0.85) 0%, rgba(0,0,0,0.98) 100%); backdrop-filter: blur(10px); }
        .panel { 
            background: rgba(10, 20, 40, 0.9); border: 2px solid var(--neon); padding: 25px; width: 90%; max-width: 400px; text-align: center;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            box-shadow: 0 0 30px rgba(0,242,255,0.2);
        }

        h1 { font-size: 40px; font-weight: 900; margin: 0; letter-spacing: 5px; color: #fff; text-shadow: 0 0 15px var(--neon); }
        h2 { color: var(--neon); font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }

        .btn { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 15px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; margin: 8px 0; transition: 0.2s; 
        }
        .btn:active { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .btn-main { background: var(--neon); color: #000; border: none; font-size: 18px; box-shadow: 0 0 15px rgba(0,242,255,0.4); }
        .btn-google { background: #fff; color: #000; border: none; font-weight: 900; }

        /* HUD */
        #hud { position: fixed; top: 0; left: 0; width: 100%; height: 60px; display: none; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; pointer-events: none; }
        #hud b { color: var(--neon); font-size: 20px; text-shadow: 0 0 10px var(--neon); }
        .pause-trigger { pointer-events: auto; background: none; border: 1px solid var(--neon); color: var(--neon); padding: 5px 12px; font-family: 'Orbitron'; cursor: pointer; }

        /* CLASSEMENT */
        .list-box { background: rgba(0,0,0,0.5); border: 1px solid rgba(0,242,255,0.2); margin-top: 15px; padding: 10px; font-size: 11px; text-align: left; }
        .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* ARSENAL STATS */
        .stat-line { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px; margin: 5px 0; font-size: 12px; border-left: 3px solid var(--neon); }
    </style>
</head>
<body>

    <div id="hud">
        <div>SCORE: <b id="v-score">0</b></div>
        <button class="pause-trigger" onclick="togglePause()">PAUSE</button>
        <div>BEST: <b id="v-best">0</b></div>
    </div>

    <div id="scr-login" class="screen" style="display: flex;">
        <div class="panel">
            <h1>TITAN</h1>
            <p style="font-size: 10px; color: var(--neon); margin-bottom: 30px; letter-spacing: 2px;">AUTHENTIFICATION REQUISE</p>
            <button class="btn btn-google" onclick="login()">SE CONNECTER AVEC GOOGLE</button>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div class="panel">
            <div id="user-info" style="margin-bottom: 20px;"></div>
            <button class="btn btn-main" onclick="startGame()">DÉPLOYER UNITÉ</button>
            <button class="btn" onclick="showScreen('scr-arsenal')">ARSENAL & MODULES</button>
            
            <div class="list-box">
                <div style="text-align:center; color: var(--gold); font-weight: 700; margin-bottom: 5px;">TOP 5 PILOTES</div>
                <div id="list">Connexion au serveur...</div>
            </div>
            
            <button class="btn" style="border:none; font-size:9px; opacity:0.4; margin-top:10px;" onclick="auth.signOut()">DÉCONNEXION DU RÉSEAU</button>
        </div>
    </div>

    <div id="scr-arsenal" class="screen">
        <div class="panel">
            <h2>ARSENAL DE DÉFENSE</h2>
            <div class="stat-line"><span>BOUCLIER PLASMA</span> <span style="color:var(--neon)">MK-1</span></div>
            <div class="stat-line"><span>ROTATION</span> <span style="color:var(--neon)">STANDARD</span></div>
            <div class="stat-line"><span>COQUE</span> <span style="color:var(--neon)">RENFORCÉE</span></div>
            <p style="font-size:9px; margin: 15px 0;">PROCHAINE MISE À JOUR : LASER AUTOMATIQUE</p>
            <button class="btn btn-main" onclick="showScreen('scr-main')">RETOUR AU HANGAR</button>
        </div>
    </div>

    <div id="scr-pause" class="screen">
        <div class="panel">
            <h2>MISSION INTERROMPUE</h2>
            <button class="btn btn-main" onclick="togglePause()">REPRENDRE</button>
            <button class="btn" onclick="location.reload()">ABANDONNER</button>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyCSCBazFl8Ent9fin0Xw1rWaMgP9yyKNgA",
    authDomain: "titan-online-e9286.firebaseapp.com",
    projectId: "titan-online-e9286",
    storageBucket: "titan-online-e9286.firebasestorage.app",
    messagingSenderId: "486050054558",
    appId: "1:486050054558:web:7364e0f450d151b96d568f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// --- AUTHENTIFICATION ---
function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider); // Plus stable sur tablette
}

auth.onAuthStateChanged(user => {
    if (user) {
        db.ref('players/' + user.uid).on('value', snap => {
            const best = snap.exists() ? (snap.val().highscore || 0) : 0;
            updateMenuUI(user, best);
            showScreen('scr-main');
        });
    } else {
        showScreen('scr-login');
    }
});

function updateMenuUI(user, best) {
    document.getElementById('user-info').innerHTML = `
        <img src="${user.photoURL}" width="50" style="border-radius:50%; border:2px solid var(--neon); margin-bottom:10px;"><br>
        <span style="font-weight:900; font-size:16px; text-transform:uppercase;">${user.displayName}</span>
    `;
    document.getElementById('v-best').innerText = best;
    loadLeaderboard();
}

function loadLeaderboard() {
    db.ref('leaderboard').orderByChild('score').limitToLast(5).on('value', snap => {
        const list = document.getElementById('list'); list.innerHTML = "";
        let players = []; snap.forEach(c => players.push(c.val()));
        players.reverse().forEach((p, i) => {
            list.innerHTML += `<div class="row"><span>#${i+1} ${p.name.split(' ')[0]}</span><b>${p.score}</b></div>`;
        });
    });
}

// --- MOTEUR DE JEU ---
let state = 'MENU', score = 0, isTouching = false;
let player = { a: 0, rad: 105, w: 0.7, speed: 0.05, boost: 0.15 };
let enemies = [];
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let w, h, cx, cy;

function resize() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; cx=w/2; cy=h/2; }
window.onresize = resize; resize();

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    if(id !== 'none') document.getElementById(id).style.display = 'flex';
}

function startGame() {
    state = 'PLAY'; score = 0; enemies = [];
    document.getElementById('hud').style.display = 'flex';
    showScreen('none');
    spawnEnemy();
}

function togglePause() {
    if(state === 'PLAY') { state = 'PAUSE'; showScreen('scr-pause'); }
    else if(state === 'PAUSE') { state = 'PLAY'; showScreen('none'); }
}

function spawnEnemy() {
    if(state !== 'PLAY') return;
    let ang = Math.random() * Math.PI * 2;
    enemies.push({ x: cx + Math.cos(ang)*w, y: cy + Math.sin(ang)*w, s: 1.8 + (score/400) });
    setTimeout(spawnEnemy, Math.max(450, 1800 - score*6));
}

function update() {
    if(state !== 'PLAY') return;
    player.a += isTouching ? player.boost : player.speed;

    enemies.forEach((e, i) => {
        let dx = cx - e.x, dy = cy - e.y, d = Math.sqrt(dx*dx + dy*dy);
        e.x += (dx/d)*e.s; e.y += (dy/d)*e.s;

        if(d < player.rad + 10 && d > player.rad - 15) {
            let pA = (Math.atan2(dy, dx) + Math.PI) % (Math.PI*2);
            let diff = Math.min(Math.abs(pA - (player.a % (Math.PI*2))), Math.PI*2 - Math.abs(pA - (player.a % (Math.PI*2))));
            if(diff < player.w) { enemies.splice(i, 1); score += 10; document.getElementById('v-score').innerText = score; }
        }
        if(d < 40) {
            state = 'MENU';
            const user = auth.currentUser;
            if(user && score > parseInt(document.getElementById('v-best').innerText)) {
                db.ref('players/' + user.uid).update({highscore: score});
                db.ref('leaderboard/' + user.uid).set({name: user.displayName, score: score});
            }
            showScreen('scr-main');
            document.getElementById('hud').style.display = 'none';
        }
    });
}

function draw() {
    ctx.fillStyle = '#020205'; ctx.fillRect(0,0,w,h);
    
    // Cœur de la planète
    ctx.shadowBlur = 15; ctx.shadowColor = var(--neon);
    ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
    ctx.shadowBlur = 0;

    if(state !== 'MENU') {
        // Bouclier Plasma
        ctx.beginPath();
        ctx.arc(cx, cy, player.rad, player.a - player.w, player.a + player.w);
        ctx.strokeStyle = isTouching ? var(--danger) : var(--neon);
        ctx.lineWidth = 12; ctx.lineCap = 'round';
        ctx.stroke();

        // Ennemis
        enemies.forEach(e => {
            ctx.fillStyle = var(--danger);
            ctx.beginPath(); ctx.arc(e.x, e.y, 7, 0, Math.PI*2); ctx.fill();
        });
    }

    if(state === 'PLAY') update();
    requestAnimationFrame(draw);
}

// CONTRÔLES TACTILES (Rester appuyé pour booster)
window.addEventListener('touchstart', (e) => { 
    if(state === 'PLAY' && e.target.tagName !== 'BUTTON') {
        isTouching = true; e.preventDefault(); 
    }
}, {passive: false});
window.addEventListener('touchend', () => isTouching = false);

draw();
</script>
</body>
    </html>
