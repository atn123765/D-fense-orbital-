<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN ONLINE | V18</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --bg: #020205; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        canvas { display: block; position: fixed; inset: 0; z-index: 1; touch-action: none; }

        .screen { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .panel { background: #0a1120; border: 2px solid var(--neon); padding: 25px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 0 20px rgba(0,242,255,0.2); }

        h1 { font-size: 30px; margin-bottom: 10px; text-shadow: 0 0 10px var(--neon); }
        input { width: 100%; background: #111; border: 1px solid var(--neon); padding: 12px; color: #fff; margin-bottom: 10px; font-family: 'Orbitron'; font-size: 16px; }
        
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 15px; font-family: 'Orbitron'; cursor: pointer; width: 100%; margin: 5px 0; font-weight: bold; }
        .btn:active { background: var(--neon); color: #000; }
        
        #msg { font-size: 10px; color: var(--neon); margin-bottom: 15px; min-height: 20px; }
        #hud { position: fixed; top: 10px; width: 100%; display: none; justify-content: space-around; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="hud">
        <span>SCORE: <b id="v-score">0</b></span>
        <span>BEST: <b id="v-best">0</b></span>
    </div>

    <div id="scr-auth" class="screen" style="display: flex;">
        <div class="panel">
            <h1>TITAN</h1>
            <div id="msg">SYSTÈME PRÊT</div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="authAction('login')">CONNEXION</button>
            <button class="btn" onclick="authAction('signup')">CRÉER COMPTE</button>
            <hr style="border: 0; border-top: 1px solid rgba(0,242,255,0.2); margin: 15px 0;">
            <button class="btn" style="border-color: #fff; color: #fff;" onclick="startOffline()">JOUER SANS COMPTE</button>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div class="panel">
            <h2 id="user-display">PILOTE</h2>
            <button class="btn" onclick="startGame()" style="background: var(--neon); color:#000;">LANCER MISSION</button>
            <button class="btn" onclick="alert('Arsenal MK-1 : Bouclier Actif')">ARSENAL</button>
            <button class="btn" onclick="location.reload()">DÉCONNEXION</button>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
// CONFIG & INITIALISATION
const msg = document.getElementById('msg');
let isFirebaseOk = false;
let highscore = localStorage.getItem('titan_best') || 0;
document.getElementById('v-best').innerText = highscore;

try {
    const config = {
        apiKey: "AIzaSyCSCBazFl8Ent9fin0Xw1rWaMgP9yyKNgA",
        authDomain: "titan-online-e9286.firebaseapp.com",
        projectId: "titan-online-e9286",
        databaseURL: "https://titan-online-e9286-default-rtdb.firebaseio.com",
        appId: "1:486050054558:web:7364e0f450d151b96d568f"
    };
    firebase.initializeApp(config);
    isFirebaseOk = true;
    msg.innerText = "SERVEURS CONNECTÉS";
} catch(e) {
    msg.innerText = "MODE HORS-LIGNE (Serveur bloqué)";
    msg.style.color = "orange";
}

// FONCTIONS AUTH
function authAction(type) {
    if(!isFirebaseOk) {
        alert("Le serveur est bloqué par ta tablette. Utilise le bouton 'Jouer sans compte'.");
        return;
    }
    const e = document.getElementById('email').value;
    const p = document.getElementById('pass').value;
    
    if(type === 'login') {
        firebase.auth().signInWithEmailAndPassword(e, p)
            .catch(err => msg.innerText = "ERREUR: " + err.message);
    } else {
        firebase.auth().createUserWithEmailAndPassword(e, p)
            .catch(err => msg.innerText = "ERREUR: " + err.message);
    }
}

firebase.auth().onAuthStateChanged(user => {
    if(user) {
        document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
        showScreen('scr-main');
    }
});

function startOffline() {
    document.getElementById('user-display').innerText = "GUEST_UNIT";
    showScreen('scr-main');
}

// LOGIQUE JEU SIMPLE
let state = 'MENU', score = 0, isTouching = false;
let player = { a: 0, rad: 100, w: 0.6 };
let enemies = [];
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'flex';
}

function startGame() {
    state = 'PLAY'; score = 0; enemies = [];
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('scr-main').style.display = 'none';
    spawn();
}

function spawn() {
    if(state !== 'PLAY') return;
    enemies.push({ x: Math.random()*window.innerWidth, y: -20, s: 3 + score/100 });
    setTimeout(spawn, 1000);
}

function draw() {
    ctx.fillStyle = '#020205'; ctx.fillRect(0,0,canvas.width,canvas.height);
    if(state === 'PLAY') {
        player.a += isTouching ? 0.12 : 0.04;
        ctx.strokeStyle = var(--neon); ctx.lineWidth = 10;
        ctx.beginPath(); ctx.arc(window.innerWidth/2, window.innerHeight/2, player.rad, player.a, player.a + player.w); ctx.stroke();
        
        // Dessin ennemis simplifié pour tester
        enemies.forEach((en, i) => {
            en.y += en.s;
            ctx.fillStyle = 'red'; ctx.fillRect(en.x, en.y, 10, 10);
            if(en.y > window.innerHeight) enemies.splice(i, 1);
        });
    }
    requestAnimationFrame(draw);
}

window.addEventListener('touchstart', () => isTouching = true);
window.addEventListener('touchend', () => isTouching = false);
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
draw();
</script>
</body>
    </html>
