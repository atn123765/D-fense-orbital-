<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN V19 | FORCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --bg: #020205; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* INTERFACES */
        .screen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg); }
        .panel { border: 2px solid var(--neon); padding: 30px; width: 90%; max-width: 400px; text-align: center; background: #0a0a10; }
        
        h1 { font-size: 35px; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-top: 0; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid var(--neon); color: #fff; font-family: 'Orbitron'; font-size: 18px; }
        
        .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; background: var(--neon); color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 16px; cursor: pointer; }
        .btn:active { background: #fff; transform: scale(0.98); }
        
        #hud { position: fixed; top: 0; width: 100%; padding: 15px; display: none; justify-content: space-between; z-index: 50; font-weight: 900; font-size: 18px; color: var(--neon); pointer-events: none; }
        canvas { display: block; position: fixed; inset: 0; z-index: 10; background: #000; }
        #error-msg { color: var(--danger); font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="hud">
        <div>SCORE: <span id="v-score">0</span></div>
        <div style="color:#fff">TITAN MK-1</div>
    </div>

    <div id="scr-auth" class="screen">
        <div class="panel">
            <h1>TITAN</h1>
            <p style="font-size:10px; margin-bottom:20px;">SYSTÈME LOCAL ACTIF (SANS FIREBASE)</p>
            <div id="error-msg"></div>
            <input type="password" id="pass" placeholder="MOT DE PASSE">
            <button class="btn" onclick="checkLogin()">ENTRER DANS LE COCKPIT</button>
            <p style="font-size:9px; color:gray;">(Indice: le mot de passe est "titan")</p>
        </div>
    </div>

    <div id="scr-menu" class="screen" style="display:none;">
        <div class="panel">
            <h2 style="color:var(--neon)">PILOTE PRÊT</h2>
            <button class="btn" onclick="launchGame()">DÉPLOYER UNITÉ</button>
            <button class="btn" style="background:none; border:1px solid var(--neon); color:var(--neon)" onclick="alert('Arsenal: Bouclier MK-1 chargé.')">ARSENAL</button>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
    // --- VARIABLES ---
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let state = 'LOGIN';
    let score = 0;
    let isTouching = false;
    let player = { a: 0, rad: 110, w: 0.8, speed: 0.04, boost: 0.14 };
    let enemies = [];

    // --- CONNEXION LOCALE ---
    function checkLogin() {
        const p = document.getElementById('pass').value.toLowerCase();
        if(p === "titan" || p === "1234") {
            document.getElementById('scr-auth').style.display = 'none';
            document.getElementById('scr-menu').style.display = 'flex';
            state = 'MENU';
        } else {
            document.getElementById('error-msg').innerText = "ACCÈS REFUSÉ : MOT DE PASSE INCORRECT";
        }
    }

    // --- LOGIQUE JEU ---
    function launchGame() {
        document.getElementById('scr-menu').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        state = 'PLAY';
        score = 0;
        enemies = [];
        spawnEnemy();
    }

    function spawnEnemy() {
        if(state !== 'PLAY') return;
        let ang = Math.random() * Math.PI * 2;
        enemies.push({
            x: window.innerWidth/2 + Math.cos(ang) * window.innerWidth,
            y: window.innerHeight/2 + Math.sin(ang) * window.innerWidth,
            s: 2.5 + (score/100)
        });
        setTimeout(spawnEnemy, Math.max(500, 1500 - score*2));
    }

    function update() {
        if(state !== 'PLAY') return;
        
        player.a += isTouching ? player.boost : player.speed;

        enemies.forEach((e, i) => {
            let dx = window.innerWidth/2 - e.x;
            let dy = window.innerHeight/2 - e.y;
            let d = Math.sqrt(dx*dx + dy*dy);
            
            e.x += (dx/d) * e.s;
            e.y += (dy/d) * e.s;

            // Collision bouclier
            if(d < player.rad + 15 && d > player.rad - 15) {
                let pA = (Math.atan2(dy, dx) + Math.PI) % (Math.PI*2);
                let diff = Math.abs(pA - (player.a % (Math.PI*2)));
                if(diff < player.w || diff > (Math.PI*2 - player.w)) {
                    enemies.splice(i, 1);
                    score += 10;
                    document.getElementById('v-score').innerText = score;
                }
            }

            // Game Over
            if(d < 40) {
                state = 'MENU';
                document.getElementById('hud').style.display = 'none';
                document.getElementById('scr-menu').style.display = 'flex';
                alert("TITAN DÉTRUIT ! Score final : " + score);
            }
        });
    }

    function draw() {
        ctx.fillStyle = '#020205';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if(state === 'PLAY') {
            // Centre
            ctx.beginPath();
            ctx.arc(window.innerWidth/2, window.innerHeight/2, 35, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();

            // Bouclier
            ctx.beginPath();
            ctx.arc(window.innerWidth/2, window.innerHeight/2, player.rad, player.a - player.w, player.a + player.w);
            ctx.strokeStyle = isTouching ? '#fff' : var(--neon);
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Ennemis
            enemies.forEach(e => {
                ctx.fillStyle = var(--danger);
                ctx.beginPath();
                ctx.arc(e.x, e.y, 8, 0, Math.PI*2);
                ctx.fill();
            });
            update();
        }
        requestAnimationFrame(draw);
    }

    // --- CONTROLES ---
    window.addEventListener('touchstart', (e) => { 
        if(state === 'PLAY') isTouching = true;
    });
    window.addEventListener('touchend', () => isTouching = false);
    
    window.onresize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };
    window.onresize();
    draw();

</script>
</body>
    </html>
