<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN ONLINE V10</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none; }
        
        /* CANVAS DU JEU */
        canvas { display: block; position: fixed; inset: 0; z-index: 1; }
        
        /* INTERFACE UTILISATEUR (Par-dessus tout) */
        #ui-layer { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        
        .panel { 
            background: rgba(10, 15, 25, 0.98); 
            padding: 30px; 
            border: 2px solid var(--neon); 
            width: 80%; 
            max-width: 350px; 
            text-align: center; 
            pointer-events: auto; /* Active les clics ici */
            box-shadow: 0 0 30px rgba(0,242,255,0.3);
        }

        .btn { 
            background: var(--neon); 
            color: #000; 
            border: none; 
            padding: 15px; 
            font-family: 'Orbitron'; 
            font-weight: 900; 
            cursor: pointer; 
            width: 100%; 
            text-transform: uppercase; 
            margin: 10px 0;
            display: block;
        }

        .btn-google { background: #fff; color: #000; font-size: 14px; }

        #hud { position: fixed; top: 10px; left: 0; width: 100%; display: none; justify-content: space-around; z-index: 500; pointer-events: none; color: var(--neon); }
        #leaderboard { margin-top: 15px; font-size: 10px; background: rgba(255,255,255,0.05); padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="hud">
        <span>SCORE: <span id="v-score">0</span></span>
        <span>BEST: <span id="v-best">0</span></span>
    </div>

    <div id="ui-layer">
        <div id="scr-login" class="panel" style="display: block;">
            <h1 style="color: var(--neon); margin:0">TITAN</h1>
            <p style="font-size: 9px; letter-spacing: 2px;">RECONNEXION AU RÉSEAU...</p>
            <button class="btn btn-google" onclick="actionLogin()">
                SE CONNECTER AVEC GOOGLE
            </button>
        </div>

        <div id="scr-main" class="panel" style="display: none;">
            <div id="user-info"></div>
            <button class="btn" onclick="actionStart()">DÉPLOYER UNITÉ</button>
            <div id="leaderboard">
                <div style="text-align:center; color:var(--neon)">CLASSEMENT TOP 5</div>
                <div id="list">Chargement...</div>
            </div>
            <button class="btn" style="background:transparent; color:red; font-size:10px;" onclick="auth.signOut()">Déconnexion</button>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyCSCBazFl8Ent9fin0Xw1rWaMgP9yyKNgA",
    authDomain: "titan-online-e9286.firebaseapp.com",
    projectId: "titan-online-e9286",
    storageBucket: "titan-online-e9286.firebasestorage.app",
    messagingSenderId: "486050054558",
    appId: "1:486050054558:web:7364e0f450d151b96d568f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// --- FONCTIONS CLICS (INDÉPENDANTES) ---
function actionLogin() {
    alert("Tentative de connexion..."); // Test pour voir si le bouton répond
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e => alert("Erreur Firebase : " + e.message));
}

function actionStart() {
    state = 'PLAY';
    document.getElementById('ui-layer').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    score = 0;
    enemies = [];
    spawnEnemy();
}

// --- SURVEILLANCE CONNEXION ---
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('scr-login').style.display = 'none';
        document.getElementById('scr-main').style.display = 'block';
        document.getElementById('ui-layer').style.display = 'flex';
        
        db.ref('players/' + user.uid).on('value', snap => {
            let best = snap.exists() ? (snap.val().highscore || 0) : 0;
            document.getElementById('v-best').innerText = best;
            document.getElementById('user-info').innerHTML = `
                <img src="${user.photoURL}" width="40" style="border-radius:50%; border:2px solid var(--neon)"><br>
                <b>${user.displayName}</b>
            `;
        });
        loadLeaderboard();
    } else {
        document.getElementById('scr-login').style.display = 'block';
        document.getElementById('scr-main').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'flex';
    }
});

function loadLeaderboard() {
    db.ref('leaderboard').orderByChild('score').limitToLast(5).on('value', snap => {
        const list = document.getElementById('list'); list.innerHTML = "";
        let players = []; snap.forEach(c => players.push(c.val()));
        players.reverse().forEach((p, i) => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between"><span>#${i+1} ${p.name.split(' ')[0]}</span><b>${p.score}</b></div>`;
        });
    });
}

// --- LOGIQUE JEU (Totalement séparée) ---
let state = 'MENU', score = 0, isTouching = false;
let player = { a: 0, rad: 100, w: 0.6 };
let enemies = [];
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let w, h, cx, cy;

function resize() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; cx=w/2; cy=h/2; }
window.onresize = resize; resize();

function spawnEnemy() {
    if(state !== 'PLAY') return;
    enemies.push({ x: cx + Math.cos(Math.random()*7)*w, y: cy + Math.sin(Math.random()*7)*w, s: 1.5 + (score/300) });
    setTimeout(spawnEnemy, 1500);
}

function update() {
    if(state !== 'PLAY') return;
    player.a += isTouching ? 0.12 : 0.04;
    enemies.forEach((e, i) => {
        let dx = cx - e.x, dy = cy - e.y, dist = Math.sqrt(dx*dx + dy*dy);
        e.x += (dx/dist) * e.s; e.y += (dy/dist) * e.s;
        if(dist < player.rad + 10 && dist > player.rad - 15) {
            let pAng = (Math.atan2(dy, dx) + Math.PI) % (Math.PI*2);
            let diff = Math.min(Math.abs(pAng - (player.a % (Math.PI*2))), Math.PI*2 - Math.abs(pAng - (player.a % (Math.PI*2))));
            if(diff < player.w) { enemies.splice(i, 1); score += 10; document.getElementById('v-score').innerText = score; }
        }
        if(dist < 40) {
            state = 'MENU';
            if(score > parseInt(document.getElementById('v-best').innerText)) {
                db.ref('players/' + auth.currentUser.uid).set({highscore: score});
                db.ref('leaderboard/' + auth.currentUser.uid).set({name: auth.currentUser.displayName, score: score});
            }
            document.getElementById('ui-layer').style.display = 'flex';
        }
    });
}

function draw() {
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,w,h);
    ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI*2); ctx.fillStyle = '#00f2ff'; ctx.fill();
    if(state === 'PLAY') {
        ctx.beginPath(); ctx.arc(cx, cy, player.rad, player.a - player.w, player.a + player.w);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 10; ctx.stroke();
        enemies.forEach(e => { ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(e.x, e.y, 6, 0, Math.PI*2); ctx.fill(); });
    }
    update();
    requestAnimationFrame(draw);
}

// Contrôles tactiles UNIQUEMENT sur le canvas
canvas.addEventListener('touchstart', (e) => { isTouching = true; e.preventDefault(); }, {passive: false});
window.addEventListener('touchend', () => { isTouching = false; });
draw();
</script>
</body>
    </html>
