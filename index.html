<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN ONLINE | V9</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --gold: #ffd700; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; position: fixed; inset: 0; z-index: 1; }
        
        /* UI SYSTEM */
        .screen { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .panel { background: #0a0f19; padding: 25px; border: 2px solid var(--neon); width: 85%; max-width: 350px; text-align: center; clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%); box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 14px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; margin: 8px 0; transition: 0.2s; }
        .btn:active { background: var(--neon); color: #000; }
        .btn-google { background: #fff; color: #000; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }

        #hud { position: fixed; top: 15px; left: 0; width: 100%; display: none; justify-content: space-around; z-index: 1000; pointer-events: none; font-size: 12px; text-shadow: 0 0 10px var(--neon); }
        #leaderboard { margin-top: 15px; font-size: 11px; text-align: left; background: rgba(255,255,255,0.05); padding: 10px; border: 1px solid rgba(0,242,255,0.1); }
        .player-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="hud">
        <span>SCORE: <span id="v-score">0</span></span>
        <span>RECORD: <span id="v-best">0</span></span>
    </div>

    <div id="scr-login" class="screen" style="display: flex;">
        <div class="panel">
            <h1 style="color: var(--neon); margin:0; font-size: 40px;">TITAN</h1>
            <p style="font-size: 9px; letter-spacing: 3px; margin-bottom:25px;">ONLINE PROTOCOL</p>
            <button class="btn btn-google" onclick="login()">
                <img src="https://www.google.com/favicon.ico" width="18"> GOOGLE SIGN-IN
            </button>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div class="panel">
            <div id="user-info" style="margin-bottom:15px;"></div>
            <button class="btn" onclick="startGame()" style="background:var(--neon); color:#000">DÉPLOYER UNITÉ</button>
            
            <div id="leaderboard">
                <div style="text-align:center; color:var(--gold); margin-bottom:5px; font-weight:900;">TOP 5 MONDIAL</div>
                <div id="list">Synchronisation...</div>
            </div>
            
            <button class="btn" style="border:none; font-size:9px; opacity:0.4; margin-top:10px;" onclick="auth.signOut()">Déconnexion</button>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyCSCBazFl8Ent9fin0Xw1rWaMgP9yyKNgA",
    authDomain: "titan-online-e9286.firebaseapp.com",
    projectId: "titan-online-e9286",
    storageBucket: "titan-online-e9286.firebasestorage.app",
    messagingSenderId: "486050054558",
    appId: "1:486050054558:web:7364e0f450d151b96d568f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// --- VARIABLES JEU ---
let data = { highscore: 0, name: "Pilote" };
let state = 'MENU', score = 0, isTouching = false;
let player = { a: 0, rad: 105, w: 0.7 };
let enemies = [];
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let w, h, cx, cy;

// --- GESTION AUTHENTIFICATION ---
function login() { 
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e => alert("Erreur: " + e.message));
}

auth.onAuthStateChanged(user => {
    if (user) {
        data.name = user.displayName;
        data.photo = user.photoURL;
        // Récupérer le record sur le cloud
        db.ref('players/' + user.uid).on('value', snap => {
            if(snap.exists()) data.highscore = snap.val().highscore || 0;
            updateMenuUI();
            showScreen('scr-main');
        });
    } else {
        showScreen('scr-login');
        document.getElementById('hud').style.display = 'none';
    }
});

function updateMenuUI() {
    document.getElementById('user-info').innerHTML = `
        <img src="${data.photo}" width="45" style="border-radius:50%; border:2px solid var(--neon); margin-bottom:5px;"><br>
        <b style="font-size:14px">${data.name.toUpperCase()}</b>
    `;
    document.getElementById('v-best').innerText = data.highscore;
    loadLeaderboard();
}

function loadLeaderboard() {
    db.ref('leaderboard').orderByChild('score').limitToLast(5).on('value', snap => {
        const list = document.getElementById('list'); list.innerHTML = "";
        let players = []; snap.forEach(c => players.push(c.val()));
        players.reverse().forEach((p, i) => {
            list.innerHTML += `<div class="player-row"><span>#${i+1} ${p.name.split(' ')[0]}</span><b>${p.score}</b></div>`;
        });
    });
}

// --- LOGIQUE MOTEUR ---
function resize() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; cx=w/2; cy=h/2; }
window.onresize = resize; resize();

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    if(id !== 'none') document.getElementById(id).style.display = 'flex';
}

function startGame() {
    state = 'PLAY'; score = 0; enemies = [];
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('v-score').innerText = "0";
    showScreen('none');
    spawnEnemy();
}

function spawnEnemy() {
    if(state !== 'PLAY') return;
    let ang = Math.random() * Math.PI * 2;
    enemies.push({ x: cx + Math.cos(ang)*w, y: cy + Math.sin(ang)*w, s: 1.6 + (score/250) });
    setTimeout(spawnEnemy, Math.max(500, 1800 - score*8));
}

function update() {
    if(state !== 'PLAY') return;
    
    // Rotation fluide (vitesse boostée si appui)
    player.a += isTouching ? 0.14 : 0.05;

    enemies.forEach((e, i) => {
        let dx = cx - e.x, dy = cy - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        e.x += (dx/dist) * e.s; e.y += (dy/dist) * e.s;

        // Collision Bouclier (Précise)
        if(dist < player.rad + 8 && dist > player.rad - 15) {
            let pAng = (Math.atan2(dy, dx) + Math.PI) % (Math.PI*2);
            let diff = Math.abs(pAng - (player.a % (Math.PI*2)));
            if(diff < player.w || diff > Math.PI*2 - player.w) {
                enemies.splice(i, 1); score += 10;
                document.getElementById('v-score').innerText = score;
            }
        }
        // Collision Planète (Game Over)
        if(dist < 40) {
            state = 'MENU';
            if(score > data.highscore) {
                data.highscore = score;
                const uid = auth.currentUser.uid;
                db.ref('players/' + uid).update({highscore: score});
                db.ref('leaderboard/' + uid).set({name: data.name, score: score});
            }
            showScreen('scr-main');
        }
    });
}

function draw() {
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,w,h);
    
    // Cœur de la planète
    let g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
    g.addColorStop(0, '#fff'); g.addColorStop(0.2, var(--neon)); g.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();

    if(state === 'PLAY') {
        // Bouclier Orbital
        ctx.beginPath();
        ctx.arc(cx, cy, player.rad, player.a - player.w, player.a + player.w);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 10; ctx.lineCap = 'round';
        ctx.stroke();

        // Ennemis
        enemies.forEach(e => {
            ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(e.x, e.y, 7, 0, Math.PI*2); ctx.fill();
            // Effet de traînée simple
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff0055';
        });
        ctx.shadowBlur = 0;
    }

    update();
    requestAnimationFrame(draw);
}

// CONTRÔLES TACTILES (Rester appuyé pour accélérer)
window.addEventListener('touchstart', (e) => { isTouching = true; e.preventDefault(); }, {passive: false});
window.addEventListener('touchend', () => { isTouching = false; });
window.addEventListener('mousedown', () => { isTouching = true; });
window.addEventListener('mouseup', () => { isTouching = false; });

draw();
</script>
</body>
</html>
