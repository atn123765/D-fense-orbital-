<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN ONLINE | V13</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --bg: #020205; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; position: fixed; inset: 0; z-index: 1; }

        /* INTERFACE */
        .screen { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); }
        .panel { background: #0a101e; border: 2px solid var(--neon); padding: 30px; width: 85%; max-width: 350px; text-align: center; }
        
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; font-family: 'Orbitron'; font-weight: 900; width: 100%; margin: 10px 0; cursor: pointer; text-transform: uppercase; }
        .btn-white { background: #fff; }
        
        #error-log { color: #ff0055; font-size: 10px; margin-top: 10px; word-break: break-all; }
        #hud { position: fixed; top: 10px; width: 100%; display: none; justify-content: space-around; z-index: 1000; color: var(--neon); font-weight: 900; }
    </style>
</head>
<body>

    <div id="hud">SCORE: <span id="v-score">0</span> | BEST: <span id="v-best">0</span></div>

    <div id="scr-login" class="screen" style="display: flex;">
        <div class="panel">
            <h1 style="text-shadow: 0 0 10px var(--neon);">TITAN V13</h1>
            <p style="font-size: 10px;">SYSTÈME DE CONNEXION</p>
            <button class="btn btn-white" onclick="doLogin()">SE CONNECTER AVEC GOOGLE</button>
            <div id="error-log"></div>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div class="panel">
            <div id="user-info" style="margin-bottom:15px;"></div>
            <button class="btn" onclick="startGame()">LANCER LE JEU</button>
            <button class="btn" style="background:transparent; color:var(--neon); border:1px solid var(--neon)" onclick="showArsenal()">ARSENAL</button>
            <button class="btn" style="background:transparent; color:red; font-size:10px;" onclick="auth.signOut()">DECONNEXION</button>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
// 1. CONFIGURATION (VERIFIE BIEN CES CLES)
const firebaseConfig = {
    apiKey: "AIzaSyCSCBazFl8Ent9fin0Xw1rWaMgP9yyKNgA",
    authDomain: "titan-online-e9286.firebaseapp.com",
    projectId: "titan-online-e9286",
    storageBucket: "titan-online-e9286.firebasestorage.app",
    messagingSenderId: "486050054558",
    appId: "1:486050054558:web:7364e0f450d151b96d568f"
};

// Initialisation avec capture d'erreur
try {
    firebase.initializeApp(firebaseConfig);
} catch (e) {
    document.getElementById('error-log').innerText = "Erreur Init: " + e.message;
}

const db = firebase.database();
const auth = firebase.auth();

// 2. FONCTION CONNEXION (LA PLUS ROBUSTE)
function doLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    // On force le mode Redirect qui est le seul à passer les bloqueurs de pub
    auth.signInWithRedirect(provider);
}

// 3. SURVEILLANCE DES ETATS
auth.onAuthStateChanged(user => {
    if (user) {
        showScreen('scr-main');
        document.getElementById('user-info').innerHTML = `<b>${user.displayName}</b>`;
        db.ref('players/' + user.uid).on('value', snap => {
            const val = snap.val();
            document.getElementById('v-best').innerText = val ? val.highscore : 0;
        });
    } else {
        showScreen('scr-login');
    }
});

// Capture les erreurs de redirection Google
auth.getRedirectResult().catch(e => {
    document.getElementById('error-log').innerText = "Erreur Google: " + e.message;
});

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'flex';
}

function showArsenal() {
    alert("MENU ARSENAL\n- Bouclier Plasma MK-1\n- Laser de défense (Bientôt)");
}

// 4. MOTEUR DE JEU (SIMPLIFIÉ POUR STABILITÉ)
let state = 'MENU', score = 0, isTouching = false;
let player = { a: 0, rad: 100, w: 0.6 };
let enemies = [];
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let w, h, cx, cy;

function resize() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; cx=w/2; cy=h/2; }
window.onresize = resize; resize();

function startGame() {
    state = 'PLAY'; score = 0; enemies = [];
    showScreen('none');
    document.getElementById('hud').style.display = 'flex';
    spawnEnemy();
}

function spawnEnemy() {
    if(state !== 'PLAY') return;
    let ang = Math.random() * Math.PI * 2;
    enemies.push({ x: cx + Math.cos(ang)*w, y: cy + Math.sin(ang)*w, s: 2 });
    setTimeout(spawnEnemy, 1500);
}

function draw() {
    ctx.fillStyle = '#020205'; ctx.fillRect(0,0,w,h);
    
    // Planète
    ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI*2); ctx.fillStyle = var(--neon); ctx.fill();

    if(state === 'PLAY') {
        player.a += isTouching ? 0.12 : 0.04;
        
        // Bouclier
        ctx.beginPath(); ctx.arc(cx, cy, player.rad, player.a - player.w, player.a + player.w);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 10; ctx.stroke();

        enemies.forEach((e, i) => {
            let dx = cx - e.x, dy = cy - e.y, d = Math.sqrt(dx*dx + dy*dy);
            e.x += (dx/d)*e.s; e.y += (dy/d)*e.s;
            
            // Collision bouclier
            if(d < 110 && d > 90) {
                let pA = (Math.atan2(dy, dx) + Math.PI) % (Math.PI*2);
                let diff = Math.min(Math.abs(pA - (player.a % (Math.PI*2))), Math.PI*2 - Math.abs(pA - (player.a % (Math.PI*2))));
                if(diff < player.w) { enemies.splice(i, 1); score += 10; document.getElementById('v-score').innerText = score; }
            }
            if(d < 40) { state = 'MENU'; location.reload(); }
            
            ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(e.x, e.y, 6, 0, Math.PI*2); ctx.fill();
        });
    }
    requestAnimationFrame(draw);
}

// CONTROLES
window.addEventListener('touchstart', (e) => { if(state === 'PLAY') isTouching = true; });
window.addEventListener('touchend', () => isTouching = false);
draw();
</script>
</body>
    </html>
