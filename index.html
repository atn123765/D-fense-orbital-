<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN | ONLINE FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        .screen { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .panel { background: #0a0f19; padding: 30px; border: 2px solid var(--neon); width: 80%; max-width: 400px; text-align: center; clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%); }
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; margin: 10px 0; }
        .btn-google { background: #fff; color: #000; border: none; }
        #leaderboard { margin-top: 20px; font-size: 11px; text-align: left; background: rgba(255,255,255,0.05); padding: 10px; border: 1px solid rgba(0,242,255,0.2); }
        #debug-msg { color: #ff0055; font-size: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="scr-login" class="screen" style="display: flex;">
        <div class="panel">
            <h1 style="color: var(--neon); margin:0">TITAN</h1>
            <p style="font-size: 10px; letter-spacing: 3px;">INITIALISATION...</p>
            <button class="btn btn-google" onclick="login()">CONNEXION GOOGLE</button>
            <div id="debug-msg"></div>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div class="panel">
            <div id="user-info"></div>
            <button class="btn" onclick="alert('Lancement...')">DÉPLOYER</button>
            <div id="leaderboard">
                <div style="text-align:center; color:var(--neon)">CLASSEMENT MONDIAL</div>
                <div id="list"></div>
            </div>
            <button class="btn" style="font-size:10px; border:none" onclick="auth.signOut()">Déconnexion</button>
        </div>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCSCBazFl8Ent9fin0Xw1rWaMgP9yyKNgA",
    authDomain: "titan-online-e9286.firebaseapp.com",
    projectId: "titan-online-e9286",
    storageBucket: "titan-online-e9286.firebasestorage.app",
    messagingSenderId: "486050054558",
    appId: "1:486050054558:web:7364e0f450d151b96d568f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    const debug = document.getElementById('debug-msg');
    debug.innerText = "Ouverture de la fenêtre...";

    auth.signInWithPopup(provider).then(res => {
        debug.innerText = "Succès ! Chargement du profil...";
        // On force le passage au menu ici
        document.getElementById('scr-login').style.display = 'none';
        document.getElementById('scr-main').style.display = 'flex';
        updateUI(res.user);
    }).catch(e => {
        debug.innerText = "ERREUR : " + e.code;
        console.error(e);
    });
}

// Sécurité : Si déjà connecté, on saute le login
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('scr-login').style.display = 'none';
        document.getElementById('scr-main').style.display = 'flex';
        updateUI(user);
    } else {
        document.getElementById('scr-login').style.display = 'flex';
        document.getElementById('scr-main').style.display = 'none';
    }
});

function updateUI(user) {
    document.getElementById('user-info').innerHTML = `
        <img src="${user.photoURL}" width="50" style="border-radius:50%; border:2px solid var(--neon)"><br>
        <b style="font-size:18px">${user.displayName}</b>
    `;
    loadLeaderboard();
}

function loadLeaderboard() {
    db.ref('leaderboard').limitToLast(5).on('value', snap => {
        const list = document.getElementById('list');
        list.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #222">
                <span>${p.name}</span><b>${p.score || 0}</b>
            </div>`;
        });
    });
}
</script>
</body>
</html>
