<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBITAL TITAN | ONLINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --gold: #ffd700; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; position: fixed; inset: 0; z-index: 1; }
        
        .screen { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); }
        .panel { background: rgba(10, 15, 25, 0.98); padding: 25px; border: 2px solid var(--neon); width: 85%; max-width: 380px; text-align: center; clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%); }
        
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 12px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin: 8px 0; width: 100%; text-transform: uppercase; }
        .btn-google { background: #fff; color: #000; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }

        #hud { position: fixed; top: 0; left: 0; width: 100%; padding: 15px; display: none; grid-template-columns: 1fr 1fr; z-index: 1000; pointer-events: none; }
        #leaderboard { margin-top: 15px; font-size: 10px; text-align: left; background: rgba(255,255,255,0.05); padding: 10px; border: 1px solid rgba(0,242,255,0.2); }
        .player-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .league-tag { font-size: 9px; padding: 2px 6px; border-radius: 3px; color: #000; font-weight: 900; }
    </style>
</head>
<body>

    <div id="hud">
        <div>SCORE: <span id="v-score">0</span></div>
        <div style="text-align: right;">BEST: <span id="v-best">0</span></div>
    </div>

    <div id="scr-login" class="screen" style="display: flex;">
        <div class="panel">
            <h1 style="color: var(--neon); margin:0">TITAN</h1>
            <p style="font-size: 10px; letter-spacing: 3px; margin-bottom:20px;">SYSTEME ONLINE</p>
            <button class="btn btn-google" onclick="login()">
                <img src="https://www.google.com/favicon.ico" width="18"> LOGIN WITH GOOGLE
            </button>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div class="panel">
            <div id="user-info" style="margin-bottom:15px;"></div>
            <button class="btn" onclick="startGame()" style="background:var(--neon); color:#000">Lancer Mission</button>
            <div id="leaderboard">
                <div style="text-align:center; color:var(--gold); margin-bottom:5px;">TOP 5 MONDIAL</div>
                <div id="list"></div>
            </div>
            <button class="btn" style="border:none; font-size:9px; opacity:0.5" onclick="auth.signOut()">Déconnexion</button>
        </div>
    </div>

    <div id="scr-over" class="screen">
        <div class="panel">
            <h2 style="color:var(--danger)">CORE BREACH</h2>
            <p id="final-score">SCORE: 0</p>
            <button class="btn" onclick="startGame()">REBOOT</button>
            <button class="btn" onclick="showScreen('scr-main')">MENU</button>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyCSCBazFl8Ent9fin0Xw1rWaMgP9yyKNgA",
    authDomain: "titan-online-e9286.firebaseapp.com",
    projectId: "titan-online-e9286",
    storageBucket: "titan-online-e9286.firebasestorage.app",
    messagingSenderId: "486050054558",
    appId: "1:486050054558:web:7364e0f450d151b96d568f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// --- VARIABLES JEU ---
let data = { highscore: 0, name: "Pilote" };
let state = 'MENU', score = 0;
let player = { a: 0, rad: 100, w: 0.6 };
let enemies = [], bullets = [], particles = [];
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let w, h, cx, cy;

function getLeague(s) {
    if(s >= 5000) return { n: "MAÎTRE", c: "#ff0055" };
    if(s >= 1000) return { n: "OR", c: "#ffd700" };
    return { n: "BRONZE", c: "#cd7f32" };
}

// --- AUTH ---
function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

auth.onAuthStateChanged(user => {
    if (user) {
        data.name = user.displayName;
        data.photo = user.photoURL;
        db.ref('players/' + user.uid).on('value', snap => {
            if(snap.exists()) data = {...data, ...snap.val()};
            updateUI();
            showScreen('scr-main');
        });
    } else {
        showScreen('scr-login');
    }
});

function updateUI() {
    const l = getLeague(data.highscore);
    document.getElementById('user-info').innerHTML = `
        <img src="${data.photo}" width="40" style="border-radius:50%; border:2px solid ${l.c}"><br>
        <b>${data.name}</b> <span class="league-tag" style="background:${l.c}">${l.n}</span>
    `;
    document.getElementById('v-best').innerText = data.highscore;
    loadLeaderboard();
}

function loadLeaderboard() {
    db.ref('leaderboard').orderByChild('score').limitToLast(5).on('value', snap => {
        const list = document.getElementById('list'); list.innerHTML = "";
        let players = []; snap.forEach(c => players.push(c.val()));
        players.reverse().forEach((p, i) => {
            list.innerHTML += `<div class="player-row"><span>#${i+1} ${p.name.split(' ')[0]}</span><b>${p.score}</b></div>`;
        });
    });
}

// --- MOTEUR DE JEU ---
function resize() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; cx=w/2; cy=h/2; }
window.onresize = resize; resize();

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    if(id !== 'none') document.getElementById(id).style.display = 'flex';
}

function startGame() {
    state = 'PLAY'; score = 0; enemies = []; bullets = [];
    document.getElementById('hud').style.display = 'grid';
    showScreen('none');
}

function spawnEnemy() {
    if(state !== 'PLAY') return;
    let ang = Math.random() * Math.PI * 2;
    enemies.push({ x: cx + Math.cos(ang)*w, y: cy + Math.sin(ang)*w, ang: ang, s: 1.5 + (score/100) });
    setTimeout(spawnEnemy, Math.max(500, 1500 - score*5));
}

function update() {
    if(state !== 'PLAY') return;
    
    // Ennemis
    enemies.forEach((e, i) => {
        let dx = cx - e.x, dy = cy - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        e.x += (dx/dist) * e.s; e.y += (dy/dist) * e.s;

        // Collision Bouclier
        if(dist < player.rad + 10 && dist > player.rad - 10) {
            let pAng = Math.atan2(dy, dx) + Math.PI;
            let diff = Math.abs(pAng - player.a % (Math.PI*2));
            if(diff < player.w || diff > Math.PI*2 - player.w) {
                enemies.splice(i, 1); score += 10;
                document.getElementById('v-score').innerText = score;
            }
        }
        // Collision Planète
        if(dist < 45) {
            state = 'OVER';
            if(score > data.highscore) {
                data.highscore = score;
                const uid = auth.currentUser.uid;
                db.ref('players/' + uid).update(data);
                db.ref('leaderboard/' + uid).set({name: data.name, score: score});
            }
            document.getElementById('final-score').innerText = "SCORE: " + score;
            showScreen('scr-over');
        }
    });
}

function draw() {
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,w,h);
    
    // Planète
    let g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 45);
    g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#00f2ff'); g.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(cx, cy, 45, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();

    if(state === 'PLAY') {
        player.a += 0.04;
        ctx.beginPath();
        ctx.arc(cx, cy, player.rad, player.a - player.w, player.a + player.w);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 8; ctx.stroke();
    }

    enemies.forEach(e => {
        ctx.fillStyle = '#ff0055';
        ctx.beginPath(); ctx.arc(e.x, e.y, 5, 0, Math.PI*2); ctx.fill();
    });

    update();
    requestAnimationFrame(draw);
}

// Touch controls
window.addEventListener('touchstart', () => { if(state === 'PLAY') player.a += 0.5; });

spawnEnemy();
draw();
</script>
</body>
    </html>
