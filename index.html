<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN V20</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; text-align: center; overflow: hidden; }
        
        /* Conteneur de login */
        #login-screen {
            position: absolute; inset: 0; background: #050505;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; /* Toujours au dessus */
        }

        input {
            padding: 20px; width: 80%; max-width: 300px; margin: 10px;
            background: #111; border: 2px solid #0ff; color: #fff; font-size: 20px;
        }

        .btn-gros {
            padding: 25px; width: 85%; max-width: 320px; margin: 15px;
            background: #0ff; color: #000; font-weight: bold; font-size: 22px;
            border: none; cursor: pointer; border-radius: 10px;
            display: block; /* Force l'affichage */
        }

        #game-ui {
            position: absolute; top: 10px; width: 100%; 
            display: none; justify-content: space-around; font-size: 25px; z-index: 500;
        }

        canvas { display: block; background: #000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 50px; margin-bottom: 5px;">TITAN</h1>
        <p id="info" style="color: yellow;">ENTREZ LE CODE : 1234</p>
        
        <input type="text" id="pass-input" placeholder="CODE ICI">
        
        <button class="btn-gros" onmousedown="valider()" ontouchstart="valider()">
            CONNEXION
        </button>
    </div>

    <div id="game-ui">
        <span>SCORE: <b id="score-txt">0</b></span>
    </div>

    <canvas id="c"></canvas>

<script>
    const login = document.getElementById('login-screen');
    const info = document.getElementById('info');
    const input = document.getElementById('pass-input');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let playing = false;
    let score = 0;
    let angle = 0;
    let press = false;

    // FONCTION DE CONNEXION
    function valider() {
        if(input.value === "1234") {
            login.style.display = "none";
            document.getElementById('game-ui').style.display = "flex";
            playing = true;
            resize();
        } else {
            info.innerText = "CODE FAUX !";
            info.style.color = "red";
        }
    }

    // REDIMENSIONNEMENT
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    // BOUCLE DE JEU
    function loop() {
        if(playing) {
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,canvas.width, canvas.height);

            // Rotation du bouclier
            angle += press ? 0.15 : 0.05;

            ctx.lineWidth = 15;
            ctx.strokeStyle = "#0ff";
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 100, angle, angle + 1.2);
            ctx.stroke();

            // Centre
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 30, 0, 7);
            ctx.fill();
        }
        requestAnimationFrame(loop);
    }
    loop();

    // COMMANDES TACTILES
    window.addEventListener('touchstart', function(e) { 
        if(e.target.tagName !== "BUTTON") press = true; 
    });
    window.addEventListener('touchend', function() { press = false; });
    window.addEventListener('mousedown', function(e) { 
        if(e.target.tagName !== "BUTTON") press = true; 
    });
    window.addEventListener('mouseup', function() { press = false; });

</script>
</body>
</html>
